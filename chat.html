<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>गुपचुप चैट - चैट रूम</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- ⚡ नया: फोटो सुपर-फास्ट भेजने के लिए स्टोरेज SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #111b21; color: #e9edef; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
        
        .floating-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 8vw; color: rgba(255, 255, 255, 0.04); font-weight: bold; pointer-events: none; z-index: 99999; white-space: nowrap; user-select: none; }

        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #202c33; z-index: 100; height: 60px; }
        .online-status { font-size: 16px; color: #00a884; font-weight: bold; }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .btn-exit { background: #ea0038; color: white; border: none; padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; }

        /* ⚡ फिक्स: टाइपिंग एरिया के नीचे जगह बढ़ाई */
        .chat-messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 70px; scroll-behavior: auto; }

        .message-row { display: flex; width: 100%; }
        .message-row.sent { justify-content: flex-end; }
        .message-row.received { justify-content: flex-start; }
        .message-bubble { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 15px; background: #202c33; cursor: pointer; }
        .sent .message-bubble { background: #005c4b; }
        .chat-image { max-width: 100%; border-radius: 6px; }

        .chat-input-area { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .chat-input { flex: 1; background: #2a3942; border: none; color: white; padding: 10px; border-radius: 20px; outline: none; }
        .btn-mic { width: 40px; height: 40px; background: #00a884; border-radius: 50%; color: #111b21; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="floatingWatermarkDisplay" class="floating-watermark">GUPCHUP</div>

    <div class="chat-header">
        <div class="online-status">● ऑनलाइन</div>
        <div class="header-actions">
            <button class="btn-exit" onclick="emergencyExit()">Exit 🏃‍♂️</button>
        </div>
    </div>

    <div id="chatMessagesArea" class="chat-messages-area"></div>

    <div class="chat-input-area">
        <textarea id="messageInputField" class="chat-input" placeholder="टाइप करें..."></textarea>
        <button class="btn-attachment" onclick="document.getElementById('galleryInput').click()">📎</button>
        <input type="file" id="galleryInput" accept="image/*" style="display: none;" onchange="sendImageMessage(this)">
        <button id="micBtn" class="btn-mic" onclick="sendTextMessage()">➤</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBq-lBqMi4nDmSImvH_yp1Wf1sdPRM8T5E",
            authDomain: "gupchup-chat-42284.firebaseapp.com",
            projectId: "gupchup-chat-42284",
            storageBucket: "gupchup-chat-42284.firebasestorage.app",
            messagingSenderId: "466844600607",
            appId: "1:466844600607:web:f09db730e62b7c555b482a",
            databaseURL: "https://gupchup-chat-42284-default-rtdb.firebaseio.com/"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage(); // स्टोरेज चालू किया

        const myGupchupID = localStorage.getItem('gupchup_id') || "User";
        const urlParams = new URLSearchParams(window.location.search);
        let partnerGupchupID = urlParams.get('partner') || "Friend";

        // ⚡ स्क्रॉल को हरदम नीचे रखने का पक्का कोड
        function scrollToBottom() {
            const container = document.getElementById('chatMessagesArea');
            container.scrollTop = container.scrollHeight;
        }

        // कीबोर्ड खुलने पर स्क्रीन एडजस्ट करने का कोड
        window.addEventListener('resize', scrollToBottom);

        function loadRealtimeMessages() {
            const chatRoomId = myGupchupID < partnerGupchupID ? myGupchupID + "_" + partnerGupchupID : partnerGupchupID + "_" + myGupchupID;
            database.ref('chats/' + chatRoomId).on('value', function(snapshot) {
                const container = document.getElementById('chatMessagesArea');
                container.innerHTML = "";
                snapshot.forEach(function(childSnapshot) {
                    const data = childSnapshot.val();
                    const row = document.createElement('div');
                    row.className = "message-row " + (data.sender === myGupchupID ? "sent" : "received");
                    
                    if (data.type === "image") {
                        row.innerHTML = `<div class="message-bubble"><img src="${data.text}" class="chat-image"></div>`;
                    } else {
                        row.innerHTML = `<div class="message-bubble">${data.text}</div>`;
                    }
                    container.appendChild(row);
                });
                scrollToBottom();
            });
        }

        function sendTextMessage() {
            const input = document.getElementById('messageInputField');
            if (input.value.trim() === "") return;
            const chatRoomId = myGupchupID < partnerGupchupID ? myGupchupID + "_" + partnerGupchupID : partnerGupchupID + "_" + myGupchupID;
            database.ref('chats/' + chatRoomId).push().set({ sender: myGupchupID, text: input.value, timestamp: Date.now(), type: "text" });
            input.value = "";
            scrollToBottom();
        }

        // ⚡ नया: फायरबेस स्टोरेज से फोटो भेजने वाला फास्ट फंक्शन
        function sendImageMessage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const storageRef = storage.ref('images/' + Date.now() + '_' + file.name);
                storageRef.put(file).then(snapshot => {
                    snapshot.ref.getDownloadURL().then(url => {
                        const chatRoomId = myGupchupID < partnerGupchupID ? myGupchupID + "_" + partnerGupchupID : partnerGupchupID + "_" + myGupchupID;
                        database.ref('chats/' + chatRoomId).push().set({ sender: myGupchupID, text: url, timestamp: Date.now(), type: "image" });
                    });
                });
            }
        }

        function emergencyExit() { window.close(); }
        window.onload = loadRealtimeMessages;
    </script>
</body>
</html>
